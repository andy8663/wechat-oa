name: Auto Sync to ClawHub
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install clawhub CLI
        run: npm install -g clawhub

      - name: Publish to ClawHub
        env:
          # 这里必须正确！
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          # 1. 修复登录命令
          clawhub login --token ${CLAWHUB_TOKEN} --no-browser
          
          # 2. 同步技能--bump patch  自动升级版本号（不用你手动改）
          # patch → 小版本 1.0.1 → 1.0.2（推荐）
          # minor → 中版本 1.0.0 → 1.1.0
          # major → 大版本 1.0.0 → 2.0.0
          clawhub sync --root ./ --all --bump minor --changelog "Auto update from GitHub"
