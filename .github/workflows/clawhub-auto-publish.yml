name: Auto Sync to ClawHub
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install clawhub CLI
        run: npm install -g clawhub

      - name: Publish / Sync to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          clawhub login --token ${CLAWWHUB_TOKEN}
          clawhub sync ./ --bump patch --changelog "Auto-update from GitHub" --all
