name: Auto Sync to ClawHub
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install clawhub CLI
        run: npm install -g clawhub

      - name: Publish to ClawHub
        env:
          # 这里必须正确！
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          # 1. 修复登录命令
          clawhub login --token ${CLAWHUB_TOKEN} --no-browser
          
          # 2. 同步技能（根目录需要有 skill.json）
          clawhub sync --root ./ --all --bump patch --changelog "Auto update from GitHub"
